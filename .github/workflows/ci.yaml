name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Check Python imports
      run: |
        python -c "import flask, sklearn, pandas, numpy, joblib"

    - name: Build Docker image
      run: docker build -t housing-app .

    - name: Run container
      run: |
        docker run -d -p 5000:5000 --name test-container housing-app
        sleep 8

    - name: Test endpoint
      run: |
        curl http://localhost:5000 || exit 1

    - name: Stop container
      run: docker stop test-container