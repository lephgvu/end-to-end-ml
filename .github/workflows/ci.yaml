name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Check imports
      run: python -c "import flask, sklearn, pandas, numpy, joblib"

    - name: Build Docker
      run: docker build -t housing-app .

    - name: Run container
      run: |
        docker run -d -p 5000:5000 --name test-container housing-app
        sleep 10

    - name: Test homepage
      run: curl http://localhost:5000 || exit 1

    - name: Stop container
      run: docker stop test-container